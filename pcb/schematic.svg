<text x="80" y="380" text-anchor="start" font-size="10" fill="black" font-weight="bold">AMBER LED (seated indicator):</text>
<text x="80" y="398" text-anchor="start" font-size="9" fill="black">+5V --> R2 (150R) --> D2 (amber) --> U3A OUT (open collector)</text>
<text x="80" y="412" text-anchor="start" font-size="9" fill="#080">Seated: U3A sinks current --> LED ON (steady)</text>
<text x="80" y="424" text-anchor="start" font-size="9" fill="#800">Deflected: U3A floats HIGH --> no current --> LED OFF</text>
<text x="80" y="450" text-anchor="start" font-size="10" fill="black" font-weight="bold">RED LED (deflection alarm, 2Hz flash):</text>
<text x="80" y="468" text-anchor="start" font-size="9" fill="black">OSC_OUT --> R3 (150R) --> D3 (red) --> Q1 drain</text>
<text x="80" y="480" text-anchor="start" font-size="9" fill="black">Q1 (2N7000) gate = COMP_A via R9 (1k), source = GND</text>
<text x="80" y="494" text-anchor="start" font-size="9" fill="#800">Deflected: COMP_A HIGH --> Q1 ON --> LED flashes at 2Hz</text>
<text x="80" y="506" text-anchor="start" font-size="9" fill="#080">Seated: COMP_A LOW --> Q1 OFF --> LED dark</text>
<text x="530" y="390" text-anchor="start" font-size="10" fill="black" font-weight="bold">J3 PINOUT:</text>
<text x="530" y="408" text-anchor="start" font-size="9" fill="black">1: GND</text>
<text x="530" y="420" text-anchor="start" font-size="9" fill="black">2: RED_LED_K</text>
<text x="530" y="432" text-anchor="start" font-size="9" fill="black">3: AMB_LED_K</text>
<text x="530" y="444" text-anchor="start" font-size="9" fill="black">4: +5V</text>
<text x="780" y="560" text-anchor="end" font-size="10" fill="#666">Total components: 25</text>
<text x="780" y="575" text-anchor="end" font-size="10" fill="#666">Board: 25mm x 35mm, 2-layer, 1oz Cu</text>
<text x="780" y="590" text-anchor="end" font-size="10" fill="#999">Kinematic Indicator Nest - Rev 1.0</text>
